        const loggedin = localStorage.getItem("loggedin");

        logoutBtn.onclick = function () {
            localStorage.removeItem("loggedin");
            localStorage.removeItem("username");

        }

        function handleWaxTimer() {

            if (waxStatus && timer === null) {

                timer = setInterval(() => {
                    time++;
                    processT++;
                    update(ref(db, 'control/DeviceOne'), {
                        waxTime: time
                    });
                    if (time >= 20) {
                        clearInterval(timer);
                        timer = null;

                        time = 0; // ⭐ RESET TIME HERE

                        update(ref(db, 'control/DeviceOne'), {
                            waxTime: time
                        });
                    }
                }, 1000);

                update(ref(db, 'control/DeviceOne'), {
