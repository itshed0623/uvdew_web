<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Processing Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: Poppins, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f6c1d1, #b96a89);
            min-height: 100vh;
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            color: white;
        }

        .header h1 {
            font-size: 22px;
            margin: 0
        }

        .navBtns button {
            background: rgba(255, 255, 255, 0.25);
            border: none;
            padding: 10px 18px;
            margin-left: 10px;
            color: white;
            border-radius: 20px;
            cursor: pointer
        }

        .navBtns button:hover {
            background: rgba(255, 255, 255, 0.4)
        }

        .container {
            padding: 20px
        }

        .section {
            display: none;
            color: white;
        }

        .active {
            display: block
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin-bottom: 20px
        }

        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15)
        }

        .card h3 {
            margin: 0;
            font-weight: 400
        }

        .card h1 {
            margin: 10px 0 0
        }

        .chartBox {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 100px;
            margin-top: 20px
        }

        canvas {
            max-width: 100%
        }

        @media(max-width:768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px
            }

            .navBtns {
                width: 100%;
                display: flex;
                flex-wrap: wrap
            }

            .navBtns button {
                flex: 1;
                margin: 5px 0
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🍎 Fruit UV & Wax Analytics</h1>
        <div class="navBtns">
            <button onclick="showPage('daily')">Daily</button>
            <button onclick="showPage('weekly')">Weekly</button>
            <button onclick="showPage('monthly')">Monthly</button>
            <button onclick="goTo()">Back to Admin Page</button>
        </div>
        <script>
            function goTo() {
                window.location = "admin_page.html";
            }
        </script>
    </div>

    <div class="container">

        <!-- DAILY -->
        <div id="daily" class="section active">
            <div class="cards">
                <div class="card">
                    <h3>Total Today</h3>
                    <h1 id="todayTotal"></h1>
                </div>
                <div class="card">
                    <h3>UV Disinfected</h3>
                    <h1 id="todayUV"></h1>
                </div>
                <div class="card">
                    <h3>Wax Coated</h3>
                    <h1 id="todayWax"></h1>
                </div>
                <div class="card">
                    <h3>UV Runtime</h3>
                    <h1 id="uvDailyTime"></h1>
                </div>
                <div class="card">
                    <h3>Wax Runtime</h3>
                    <h1 id="waxDailyTime"></h1>
                </div>
                <div class="card">
                    <h3>Energy Used</h3>
                    <h1>20 kWh</h1>
                </div>
            </div>
            <div class="chartBox"><canvas id="dailyChart"></canvas></div>
            <div class="chartBox"><canvas id="dailyRuntimeChart"></canvas></div>
        </div>

        <!-- WEEKLY -->
        <div id="weekly" class="section">
            <div class="cards">
                <div class="card">
                    <h3>Total Fruits</h3>
                    <h1>4350</h1>
                </div>
                <div class="card">
                    <h3>UV Runtime</h3>
                    <h1>280 min</h1>
                </div>
                <div class="card">
                    <h3>Wax Runtime</h3>
                    <h1>190 min</h1>
                </div>
                <div class="card">
                    <h3>Wax Used</h3>
                    <h1>2.1 L</h1>
                </div>
            </div>
            <div class="chartBox"><canvas id="weeklyChart"></canvas></div>
            <div class="chartBox"><canvas id="weeklyRuntimeChart"></canvas></div>
        </div>

        <!-- MONTHLY -->
        <div id="monthly" class="section">
            <div class="cards">
                <div class="card">
                    <h3>Total Fruits</h3>
                    <h1>25,600</h1>
                </div>
                <div class="card">
                    <h3>UV Runtime</h3>
                    <h1>19 hrs</h1>
                </div>
                <div class="card">
                    <h3>Wax Runtime</h3>
                    <h1>14 hrs</h1>
                </div>
                <div class="card">
                    <h3>Energy</h3>
                    <h1>430 kWh</h1>
                </div>
            </div>
            <div class="chartBox"><canvas id="monthlyChart"></canvas></div>
            <div class="chartBox"><canvas id="monthlyRuntimeChart"></canvas></div>
        </div>

    </div>

    <script>
        function showPage(page) { document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active')); document.getElementById(page).classList.add('active'); }

        const data = { daily: [120, 150, 180, 170, 160, 190, 210], weekly: [980, 1020, 1100, 1250], monthly: [4200, 4500, 4700, 5200, 5600, 6100] };
        const uvDaily = [30, 35, 40, 38, 36, 42, 45];
        const waxDaily = [20, 25, 28, 27, 26, 29, 30];
        const uvWeekly = [60, 70, 75, 80];
        const waxWeekly = [45, 50, 48, 47];
        const uvMonthly = [260, 280, 300, 320, 340, 360];
        const waxMonthly = [190, 210, 220, 230, 240, 260];

        const today = data.daily[data.daily.length - 1];
        document.getElementById('todayTotal').innerText = today;
        document.getElementById('todayUV').innerText = Math.round(today * 0.6);
        document.getElementById('todayWax').innerText = Math.round(today * 0.4);
        document.getElementById('uvDailyTime').innerText = '45 min';
        document.getElementById('waxDailyTime').innerText = '30 min';

        new Chart(document.getElementById('dailyChart'), { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Daily Fruits', data: data.daily, borderWidth: 3 }] } });
        new Chart(document.getElementById('weeklyChart'), { type: 'bar', data: { labels: ['Week1', 'Week2', 'Week3', 'Week4'], datasets: [{ label: 'Weekly Fruits', data: data.weekly }] } });
        new Chart(document.getElementById('monthlyChart'), { type: 'line', data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ label: 'Monthly Fruits', data: data.monthly, borderWidth: 3 }] } });

        // RUNTIME CHARTS
        new Chart(document.getElementById('dailyRuntimeChart'), { type: 'bar', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'UV Runtime (min)', data: uvDaily }, { label: 'Wax Runtime (min)', data: waxDaily }] } });
        new Chart(document.getElementById('weeklyRuntimeChart'), { type: 'bar', data: { labels: ['Week1', 'Week2', 'Week3', 'Week4'], datasets: [{ label: 'UV Runtime', data: uvWeekly }, { label: 'Wax Runtime', data: waxWeekly }] } });
        new Chart(document.getElementById('monthlyRuntimeChart'), { type: 'line', data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ label: 'UV Runtime', data: uvMonthly, borderWidth: 3 }, { label: 'Wax Runtime', data: waxMonthly, borderWidth: 3 }] } });
    </script>

</body>

</html>
